name: InZone
options:
  bundleIdPrefix: com.inzone
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  InZone:
    type: application
    platform: iOS
    sources:
      - path: InZone
        excludes:
          - "*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: InZone/Info.plist
        CODE_SIGN_ENTITLEMENTS: InZone/InZone.entitlements
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.inzone.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
