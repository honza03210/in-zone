name: iOS TestFlight

# Manual only. Archives a MANUALLY-signed build with a FIXED Apple Distribution
# certificate + App Store provisioning profile (provided as secrets) and uploads
# it to TestFlight.
#
# Why manual signing: -allowProvisioningUpdates / CODE_SIGN_STYLE=Automatic makes
# each fresh CI runner generate a NEW distribution certificate every run, which
# quickly exhausts Apple's distribution-cert limit and then fails with
# "No profiles for '<bundle id>' were found". Manual signing reuses the one
# certificate you set up, so it never regenerates.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   Signing (reused every build — see docs/ios-testflight-signing.md to create
#   these WITHOUT a Mac):
#     BUILD_CERTIFICATE_BASE64        base64 of your Apple Distribution cert+key (.p12)
#     P12_PASSWORD                    password you set on that .p12
#     BUILD_PROVISION_PROFILE_BASE64  base64 of the App Store .mobileprovision (com.inzoned.app)
#     PROVISIONING_PROFILE_NAME       the profile's exact name in the Apple portal
#     KEYCHAIN_PASSWORD               any throwaway string (temp keychain password)
#     APPLE_TEAM_ID                   10-char team id
#   Upload only (does NOT affect signing):
#     ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8   App Store Connect API key for the upload
on:
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/InZone
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: |
          brew install xcodegen
          command -v xcbeautify >/dev/null || brew install xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ] || [ -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ]; then
            echo "::error::Missing signing secrets — see docs/ios-testflight-signing.md."
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          # Temporary keychain holding only our distribution cert + key.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain

          # Install the provisioning profile where Xcode looks for it.
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Write App Store Connect API key (upload auth only)
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          printf '%s' "$ASC_KEY_P8" > "$RUNNER_TEMP/keys/AuthKey.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Archive (manual signing, fixed certificate)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project InZone.xcodeproj \
            -scheme InZone \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/InZone.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            | xcbeautify

      - name: Export & upload to TestFlight (manual signing)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          PLIST="$RUNNER_TEMP/ExportOptions.plist"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '<key>method</key><string>app-store-connect</string>' \
            '<key>destination</key><string>upload</string>' \
            "<key>teamID</key><string>${TEAM_ID}</string>" \
            '<key>signingStyle</key><string>manual</string>' \
            '<key>provisioningProfiles</key><dict>' \
            "<key>com.inzoned.app</key><string>${PROFILE_NAME}</string>" \
            '</dict>' \
            '</dict></plist>' > "$PLIST"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/InZone.xcarchive" \
            -exportOptionsPlist "$PLIST" \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | xcbeautify
