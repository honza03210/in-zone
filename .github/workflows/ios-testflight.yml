# Manual only. Run from the Actions tab once the App Store Connect secrets are
# set (requires a paid Apple Developer account). It archives a properly signed
# build and uploads it to TestFlight; install it over the air via the TestFlight
# app on the iPhone — no cable, no Mac of your own, no AltStore. Internal
# testing needs no App Review, so the build is usable minutes after processing.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   ASC_KEY_ID      App Store Connect API key id (e.g. 2X9R4HXF34)
#   ASC_ISSUER_ID   App Store Connect issuer id (a UUID)
#   ASC_KEY_P8      full contents of the AuthKey_<id>.p8 file (paste as-is)
#   APPLE_TEAM_ID   10-char Apple Developer team id
#
# One-time setup on Apple's side:
#   - Create the app record in App Store Connect with bundle id com.inzone.app
#   - The Nearby Interaction capability is auto-registered on the App ID by
#     -allowProvisioningUpdates from the app's entitlement; no manual step
#     needed (but you can enable it on the App ID explicitly if you prefer).
name: iOS TestFlight

on:
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/InZone

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: |
          brew install xcodegen
          command -v xcbeautify >/dev/null || brew install xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          if [ -z "$ASC_KEY_P8" ] || [ -z "$ASC_KEY_ID" ]; then
            echo "::error::Missing ASC_KEY_P8 / ASC_KEY_ID secrets"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keys"
          printf '%s' "$ASC_KEY_P8" > "$RUNNER_TEMP/keys/AuthKey.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Archive (automatic signing via API key)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project InZone.xcodeproj \
            -scheme InZone \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/InZone.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            | xcbeautify

      - name: Export & upload to TestFlight
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -o pipefail

          PLIST="$RUNNER_TEMP/ExportOptions.plist"

          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '<key>method</key><string>app-store-connect</string>' \
            '<key>destination</key><string>upload</string>' \
            "<key>teamID</key><string>${TEAM_ID}</string>" \
            '<key>signingStyle</key><string>automatic</string>' \
            '</dict></plist>' > "$PLIST"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/InZone.xcarchive" \
            -exportOptionsPlist "$PLIST" \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | xcbeautify
