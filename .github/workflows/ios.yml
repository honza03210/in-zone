name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

# Cancel superseded runs on the same branch to save macOS minutes (10x billed)
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/InZone
    steps:
      - uses: actions/checkout@v5

      # Homebrew installs the latest XcodeGen, which emits the newest project
      # format (objectVersion 77). Pin a matching newest-stable Xcode so
      # xcodebuild can read it; otherwise the image default may lag and fail
      # with "future Xcode project file format".
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i iphone || true

      - name: Install tools
        run: |
          brew install xcodegen
          command -v xcbeautify >/dev/null || brew install xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      # Pick whatever base iPhone simulator the runner's Xcode ships, so the
      # destination doesn't break when GitHub bumps the image (the device list
      # moves from iPhone 15 -> 16 -> 17 ...). The app supports iOS 16+, so any
      # available runtime works.
      - name: Select simulator
        run: |
          LINE=$(xcrun simctl list devices available | grep -E 'iPhone [0-9]+ \(' | head -1)
          UDID=$(echo "$LINE" | grep -oE '[0-9A-Fa-f-]{36}')
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; exit 1
          fi
          echo "Using:$LINE"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project InZone.xcodeproj \
            -scheme InZone \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: TestResults
          path: ios/InZone/TestResults.xcresult
          retention-days: 7

      # Build an UNSIGNED .ipa for sideloading. AltStore (Windows) re-signs it
      # with a free Apple ID on install, so we just need the app bundle wrapped
      # in a Payload/ folder. Device build (generic/platform=iOS), no signing.
      # Skipped on PRs to save macOS minutes; runs on push to main + manual run.
      - name: Build device app (unsigned)
        if: github.event_name != 'pull_request'
        run: |
          set -o pipefail
          xcodebuild \
            -project InZone.xcodeproj \
            -scheme InZone \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build \
            | xcbeautify

      - name: Package unsigned .ipa
        if: github.event_name != 'pull_request'
        run: |
          set -e
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP" ]; then echo "no .app produced"; exit 1; fi
          echo "packaging $APP"
          rm -rf Payload InZone-unsigned.ipa
          mkdir Payload
          cp -R "$APP" Payload/
          # -y preserves symlinks (matters for any embedded frameworks)
          zip -qry InZone-unsigned.ipa Payload
          ls -la InZone-unsigned.ipa

      - name: Upload unsigned .ipa
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: InZone-unsigned-ipa
          path: ios/InZone/InZone-unsigned.ipa
          retention-days: 14
