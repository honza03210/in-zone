name: iOS

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

# Cancel superseded runs on the same branch to save macOS minutes (10x billed)
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios/InZone
    steps:
      - uses: actions/checkout@v4

      # Uses the image's default Xcode. Pin with maxim-lobanov/setup-xcode if a
      # specific version is ever needed; the default is a recent stable release.
      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i iphone || true

      - name: Install tools
        run: |
          brew install xcodegen
          command -v xcbeautify >/dev/null || brew install xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project InZone.xcodeproj \
            -scheme InZone \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ios/InZone/TestResults.xcresult
          retention-days: 7
